<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto · Lucía Rodríguez</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --font: 'Courier Prime', monospace;
    --bg-color: #bddbfa; /* azul oscuro */
    --text-color: black; /* blanco */
    --link-hover: #e97d25; /* azul claro al hover */
}

body {
    font-family: var(--font);
    background: var(--bg-color);
    color: var(--text-color);
}

/* LAYOUT */
.page {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 400px;
    padding: 40px 40px; /* espacio interno uniforme */
}

.site-name a {
    display: block;       /* ocupa todo el ancho disponible */
    font-size: 16pt;
    text-decoration: none;
    color: var(--text-color);
    margin-bottom: 40px;  /* separa del nav */
}

.site-name a:hover {
    color: var(--link-hover);
}

nav {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

nav a {
    display: block;       /* ocupa todo el ancho del sidebar */
    font-size: 14pt;
    color: var(--text-color);
    text-decoration: none;
}

nav a:hover,
.site-name a:hover {
    color: var(--link-hover);
}

/* MAIN */
.main {
    flex: 1;
    padding: 120px 80px;
    position: relative;
}

/* TEXTO */
.contact-block {
    max-width: 520px;
}

.contact-title {
    font-size: 82pt;
    text-align: right;
    position: absolute;
    bottom: 20px;   /* distancia desde abajo */
    right: 40px;    /* distancia desde la derecha */
}

.contact-text {
    font-size: 14pt;
    color: var(--text-color);
    position: absolute;
    bottom: 285px;   
    right: 1375px;
}

/* EMAIL */
.email {
    font-size: 12pt;
    text-decoration: none;
    color: var(--text-color);
    transition: color 0.3s;
    text-align: left;
    position: absolute;
    bottom: 260px;   
    right: 1147px;
}

.email:hover {
    color: var(--link-hover);
}


/* MOBILE */
@media (max-width: 768px) {
    .page {
        flex-direction: column;
    }

    .main {
        padding: 60px 30px;
    }
}
</style>
</head>

<body>

<div class="page">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="site-name">
            <a href="index.html">Lucía Rodríguez</a>
        </div>

        <nav>
            <a href="index.html">Work</a>
            <a href="about-me.html">About me</a>
            <a href="contact.html">Contact</a>
        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="contact-block">
            <div class="contact-title">Hey!<br>let's talk</div>
        </div>

        <div class="contact-text">CONTACT</div>
        <div class="email">luciarodriguezcuenca12@gmail.com</div>
       

    </main>

</div>

</body>
</html>
