<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto · Lucía Rodríguez</title>
    <link rel="icon" href="../images/1.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --font: 'Courier Prime', monospace;
            --bg-color: #bddbfa;
            /* azul oscuro */
            --text-color: black;
            /* blanco */
            --link-hover: #e97d25;
            /* azul claro al hover */
        }

        body {
            font-family: var(--font);
            background: var(--bg-color);
            color: var(--text-color);
        }

        /* LAYOUT */
        .page {
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 400px;
            padding: 40px 40px;
            /* espacio interno uniforme */
        }

        .site-name a {
            display: block;
            /* ocupa todo el ancho disponible */
            font-size: 16pt;
            text-decoration: none;
            color: var(--text-color);
            margin-bottom: 40px;
            /* separa del nav */
        }

        .site-name a:hover {
            color: var(--link-hover);
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        nav a {
            display: block;
            /* ocupa todo el ancho del sidebar */
            font-size: 14pt;
            color: var(--text-color);
            text-decoration: none;
        }

        nav a:hover,
        .site-name a:hover {
            color: var(--link-hover);
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 120px 80px;
            position: relative;
        }

        /* TEXTO */
        .contact-block {
            max-width: 520px;
        }

        .contact-title {
            font-size: 82pt;
            text-align: right;
            position: absolute;
            bottom: 20px;
            /* distancia desde abajo */
            right: 40px;
            /* distancia desde la derecha */
        }

        .contact-text {
            font-size: 14pt;
            color: var(--text-color);
            position: absolute;
            bottom: 285px;
            right: 1363px;
        }

        /* EMAIL */
        .email {
            font-size: 12pt;
            text-decoration: none;
            color: var(--text-color);
            transition: color 0.3s;
            text-align: left;
            position: absolute;
            bottom: 260px;
            right: 1147px;
        }

        .email:hover {
            color: var(--link-hover);
        }

        .sidebar {
            width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* empuja el footer abajo */
            padding: 40px;
            height: 100vh;
            /* ocupa toda la altura */
        }

        .sidebar-footer {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* alineado a la izquierda */
            gap: 8px;
            text-decoration: none;
        }

        .sidebar-footer .copyright {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* alineado a la izquierda */
            gap: 8px;
            font-size: 8.9pt;
        }

        .sidebar-footer a {
            color: black;
            /* negro */
            text-decoration: none;
            /* sin subrayado */
            font-family: var(--font);
        }

        .sidebar-footer a:hover {
            color: var(--link-hover);
            /* color al pasar el mouse */
        }

        .sidebar-divider {
            width: 156px;
            height: 1px;
            background: #111;
        }

@media (min-width: 769px) {
    footer.sidebar-footer {
        display: none; /* oculto en escritorio */
    }
}


        @media (max-width: 768px) {

     
     .page {
        flex-direction: column; /* apila sidebar y main */
    }

     .sidebar {
        width: 100%;
        padding: 20px;
        height: auto;
        justify-content: flex-start;
    }
    

    .main {
        width: 100%;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
    }

    .contact-title {
        position: static !important;
        font-size: 32pt;
        margin-bottom: 20px;
        text-align: left !important;
    }

    .contact-text,
    .email {
        position: static !important;
        width: 100%;
        text-align: left;
        margin-bottom: 10px;
        font-size: 11pt;
    }

       .sidebar-footer {
        order: 1; /* para que se muestre después del main */
        width: 100%;
        margin-top: 20px;
        align-items: flex-start;
    }

        footer.sidebar-footer {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
        margin-top: 20px;
        margin-bottom: 20px;
        margin-left: 20px;
    }

      
}

    </style>
</head>

<body>

    <div class="page">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="site-name">
                    <a href="index.html">Lucía Rodríguez</a>
                </div>

                <nav>
                    <a href="index.html">Trabajos</a>
                    <a href="about-me.html">Sobre mí</a>
                    <a href="contact.html">Contacto</a>
                </nav>
            </div>

        </aside>

        <!-- MAIN -->
        <main class="main">

            <div class="contact-block">
                <div class="contact-title">Hey!<br>let's talk</div>
            </div>

            <div class="contact-text">CONTACTO</div>
            <div class="email">luciarodriguezcuenca12@gmail.com</div>


        </main>


    <!-- FOOTER (solo en móvil) -->
    <footer class="sidebar-footer">
        <a href="english/contact.html">EN</a>
        <div class="sidebar-divider"></div>
        <p class="copyright">© 2026 LUCÍA RODRÍGUEZ</p>
    </footer>

    </div>

</body>

</html>
